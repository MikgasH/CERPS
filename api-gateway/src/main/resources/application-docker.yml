server:
  port: 8000

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        # User Service routes
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        # Currency Service routes
        - id: currency-service
          uri: http://currency-service:8080
          predicates:
            - Path=/api/v1/currencies/**
          filters:
            - StripPrefix=0

        # Analytics Service routes
        - id: analytics-service
          uri: http://analytics-service:8082
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - StripPrefix=0

        # User Service OpenAPI docs
        - id: user-service-api-docs
          uri: http://user-service:8081
          predicates:
            - Path=/user-service/v3/api-docs/**
          filters:
            - RewritePath=/user-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}

        # Currency Service OpenAPI docs
        - id: currency-service-api-docs
          uri: http://currency-service:8080
          predicates:
            - Path=/currency-service/v3/api-docs/**
          filters:
            - RewritePath=/currency-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}

        # Analytics Service OpenAPI docs
        - id: analytics-service-api-docs
          uri: http://analytics-service:8082
          predicates:
            - Path=/analytics-service/v3/api-docs/**
          filters:
            - RewritePath=/analytics-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    root: INFO
    com.example.apigateway: DEBUG
    org.springframework.cloud.gateway: INFO

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: /user-service/v3/api-docs
      - name: Currency Service
        url: /currency-service/v3/api-docs
      - name: Analytics Service
        url: /analytics-service/v3/api-docs

