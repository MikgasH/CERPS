openapi: 3.1.0
info:
  title: Currency Exchange Service API
  description: REST API for currency exchange rate management and conversion
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: API Gateway
security:
  - Bearer Authentication: []
tags:
  - name: Currency
    description: Currency exchange operations
  - name: Admin Provider Keys
    description: API key management for external providers (ADMIN only)
paths:
  /api/v1/currencies:
    get:
      tags:
        - Currency
      summary: Get list of supported currencies
      description: "Returns all currencies available for exchange rate operations.\
        \ Available for USER, PREMIUM_USER, ADMIN roles."
      operationId: getCurrencies
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: List of supported currency codes
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
      security:
        - Bearer Authentication: []
    post:
      tags:
        - Currency
      summary: Add a new currency (ADMIN only)
      description: "Adds a new currency to the list of supported currencies. Only\
        \ administrators can add new currencies."
      operationId: addCurrency
      parameters:
        - name: currency
          in: query
          required: true
          schema:
            type: string
            pattern: "^[A-Z]{3}$"
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden - requires ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Invalid currency code
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Currency already exists
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Currency added successfully
          content:
            '*/*':
              schema:
                type: string
      security:
        - Bearer Authentication: []
  /api/v1/currencies/convert:
    post:
      tags:
        - Currency
      summary: Convert currency amount
      description: "Converts an amount from one currency to another using current\
        \ exchange rates. Available for USER, PREMIUM_USER, ADMIN roles."
      operationId: convertCurrency
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversionRequest"
        required: true
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "503":
          description: Service Unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Conversion successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversionResponse"
      security:
        - Bearer Authentication: []
  /api/v1/currencies/refresh:
    post:
      tags:
        - Currency
      summary: Refresh exchange rates (ADMIN only)
      description: "Manually triggers an update of exchange rates from external providers.\
        \ Only administrators can refresh rates."
      operationId: refreshRates
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden - requires ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "503":
          description: Service Unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Exchange rates updated successfully
          content:
            '*/*':
              schema:
                type: string
      security:
        - Bearer Authentication: []
  /api/v1/admin/provider-keys:
    get:
      tags:
        - Admin Provider Keys
      summary: Get all active provider keys
      description: "Retrieves a list of all active provider API keys. Returns metadata\
        \ only, not the actual keys. ADMIN only."
      operationId: getAllActiveProviderKeys
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden - requires ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: List of active provider keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderKeyResponse"
      security:
        - Bearer Authentication: []
    post:
      tags:
        - Admin Provider Keys
      summary: Create new provider API key
      description: "Creates and encrypts a new API key for an external provider.\
        \ ADMIN only."
      operationId: createProviderKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderKeyRequest"
        required: true
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden - requires ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Invalid request data
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Provider key already exists
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "201":
          description: Provider key created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderKeyResponse"
      security:
        - Bearer Authentication: []
  /api/v1/admin/provider-keys/{id}:
    get:
      tags:
        - Admin Provider Keys
      summary: Get provider key by ID
      description: Retrieves a specific provider key by its ID. ADMIN only.
      operationId: getProviderKey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden - requires ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Provider key not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Provider key found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderKeyResponse"
      security:
        - Bearer Authentication: []
    put:
      tags:
        - Admin Provider Keys
      summary: Update provider API key
      description: "Updates an existing provider API key. The new key will be encrypted.\
        \ ADMIN only."
      operationId: updateProviderKey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderKeyRequest"
        required: true
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden - requires ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Provider key not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Invalid request data
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Provider key updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderKeyResponse"
      security:
        - Bearer Authentication: []
    delete:
      tags:
        - Admin Provider Keys
      summary: Deactivate provider key
      description: "Soft deletes a provider API key by setting its active status to\
        \ false. ADMIN only."
      operationId: deleteProviderKey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden - requires ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Provider key not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "204":
          description: Provider key deactivated
      security:
        - Bearer Authentication: []
  /api/v1/admin/provider-keys/{id}/rotate:
    post:
      tags:
        - Admin Provider Keys
      summary: Rotate provider API key
      description: "Rotates the API key by replacing it with a new one and re-encrypting.\
        \ ADMIN only."
      operationId: rotateProviderKey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderKeyRequest"
        required: true
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden - requires ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Provider key not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Invalid request data
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Provider key rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderKeyResponse"
      security:
        - Bearer Authentication: []
components:
  schemas:
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        properties:
          type: object
          additionalProperties: {}
    ConversionRequest:
      type: object
      properties:
        amount:
          type: number
        from:
          type: string
        to:
          type: string
      required:
        - amount
        - from
        - to
    ConversionResponse:
      type: object
      properties:
        success:
          type: boolean
        originalAmount:
          type: number
        fromCurrency:
          type: string
        toCurrency:
          type: string
        convertedAmount:
          type: number
        exchangeRate:
          type: number
        timestamp:
          type: string
          format: date-time
    CreateProviderKeyRequest:
      type: object
      properties:
        providerName:
          type: string
          minLength: 1
          maxLength: 50
        apiKey:
          type: string
      required:
        - providerName
        - apiKey
    UpdateProviderKeyRequest:
      type: object
      properties:
        apiKey:
          type: string
      required:
        - apiKey
    ProviderKeyResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        providerName:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
  securitySchemes:
    Bearer Authentication:
      type: http
      description: Enter JWT token
      scheme: bearer
      bearerFormat: JWT
