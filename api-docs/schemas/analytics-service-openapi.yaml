openapi: 3.1.0
info:
  title: Analytics Service API
  description: "REST API for currency trends analytics. Available for PREMIUM_USER\
    \ and ADMIN roles only."
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: API Gateway
security:
  - Bearer Authentication: []
tags:
  - name: Analytics
    description: Currency trends analytics endpoints (PREMIUM_USER, ADMIN only)
paths:
  /api/v1/analytics/trends:
    get:
      tags:
        - Analytics
      summary: Calculate currency trend over period
      description: "Calculates the percentage change in exchange rate between two\
        \ currencies over a specified period. Access: PREMIUM_USER, ADMIN only.\
        \ Period format: {number}{unit} where H=hours (12-8760), D=days (1-365),\
        \ M=months (1-12), Y=years (1 only). Valid examples: 12H, 24H, 7D, 30D, 1M, 1Y"
      operationId: getTrends
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: "^[A-Z]{3}$"
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: "^[A-Z]{3}$"
        - name: period
          in: query
          required: true
          schema:
            type: string
            pattern: "^\\d+[HDMY]$"
      responses:
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden - requires PREMIUM_USER or ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Invalid request - validation failed
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Insufficient data for trend analysis
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Trend calculated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendsResponse"
      security:
        - Bearer Authentication: []
components:
  schemas:
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        properties:
          type: object
          additionalProperties: {}
    TrendsResponse:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        period:
          type: string
        oldRate:
          type: number
        newRate:
          type: number
        changePercentage:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        dataPoints:
          type: integer
  securitySchemes:
    Bearer Authentication:
      type: http
      description: Enter JWT token
      scheme: bearer
      bearerFormat: JWT
