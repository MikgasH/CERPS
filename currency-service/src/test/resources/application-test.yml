spring:
  application:
    name: CERPS-Hashkin-Test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  liquibase:
    enabled: false

  sql:
    init:
      mode: always
      data-locations: classpath:test-data.sql

  main:
    allow-bean-definition-overriding: true

scheduling:
  enabled: false

api:
  fixer:
    access-key: test-fixer-key
  exchangerates:
    access-key: test-exchangerates-key
  currencyapi:
    access-key: test-currencyapi-key

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tdGVzdGluZy1wdXJwb3Nlcy1vbmx5LTEyMzQ1Njc4OTA=
  expiration: 86400000

admin:
  api-key: test-admin-api-key

encryption:
  master-key: xtCPEriABFzNjq7KmLK5BmGt8vbWPq0PcB1C7Y8DxNo=

logging:
  level:
    com.example.cerpshashkin: WARN
    com.github.tomakehurst.wiremock: ERROR
