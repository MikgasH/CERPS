# Railway.app deployment profile — extreme memory savings
server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 10
      min-spare: 2
    max-connections: 50
    accept-count: 10
    connection-timeout: 5000

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 120000
      max-lifetime: 300000
      connection-timeout: 10000
      leak-detection-threshold: 30000

  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 10
        query:
          plan_cache_max_size: 64
          plan_parameter_metadata_max_size: 16

  liquibase:
    enabled: true

# Disable Swagger UI in production to save RAM (~15-20MB)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Slim down actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: false

# Reduce logging overhead
logging:
  level:
    root: WARN
    com.example: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
