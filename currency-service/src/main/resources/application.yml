server:
  port: ${PORT:8080}

spring:
  application:
    name: currency-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:5}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      idle-timeout: 120000
      max-lifetime: 300000
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

api:
  fixer:
    url: http://data.fixer.io/api
  exchangerates:
    url: http://api.exchangeratesapi.io/v1
  currencyapi:
    url: https://api.currencyapi.com/v3

admin:
  api-key: ${ADMIN_API_KEY}

cache:
  exchange-rates:
    ttl: 3600

scheduling:
  enabled: true
  exchange-rates:
    rate: 28800000

exchange-rates:
  base-currency: EUR

encryption:
  master-key: ${ENCRYPTION_MASTER_KEY}

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    enable:
      jvm: false
      process: false
      system: false
      tomcat: false
      logback: false
      executor: false
      spring.security: false
      disk: false
      hikaricp: true
      jdbc: false
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.example.cerpshashkin: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

resilience4j:
  retry:
    instances:
      fixerClient:
        max-attempts: 3
        wait-duration: 2s
      exchangeRatesClient:
        max-attempts: 3
        wait-duration: 2s
      currencyApiClient:
        max-attempts: 3
        wait-duration: 2s
