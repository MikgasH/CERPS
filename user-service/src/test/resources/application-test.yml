spring:
  application:
    name: User-Management-Service

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  liquibase:
    enabled: false

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: always

server:
  port: 0

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW11c3QtYmUtbG9uZy1lbm91Z2gtZm9yLWhzMjU2LWFsZ29yaXRobQ==
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  metrics:
    enable:
      jvm: false
      process: false
      system: false

logging:
  level:
    org.example.userservice: DEBUG
    org.springframework.security: WARN
    liquibase: OFF
    org.hibernate.SQL: OFF
