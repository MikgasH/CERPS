name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test All Services
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Setup Docker for Testcontainers
        run: |
          docker version
          docker ps

      - name: Build and Test All Services
        run: mvn clean verify

      - name: Upload Test Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 30

      - name: Generate Coverage Reports
        run: mvn jacoco:report

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 30

      - name: Display Coverage Summary
        run: |
          echo "=== Coverage Summary ==="
          echo ""
          echo "API Gateway:"
          grep -A 3 "Total" api-gateway/target/site/jacoco/index.html | head -4 || echo "No coverage data"
          echo ""
          echo "Currency Service:"
          grep -A 3 "Total" currency-service/target/site/jacoco/index.html | head -4 || echo "No coverage data"
          echo ""
          echo "User Service:"
          grep -A 3 "Total" user-service/target/site/jacoco/index.html | head -4 || echo "No coverage data"
          echo ""
          echo "Analytics Service:"
          grep -A 3 "Total" analytics-service/target/site/jacoco/index.html | head -4 || echo "No coverage data"

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check || true

      - name: Run PMD
        run: mvn pmd:check || true

      - name: Compile All Services
        run: mvn clean compile
