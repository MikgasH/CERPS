name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-all:
    name: Build and Test All Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test All
        run: mvn clean verify

      - name: Generate Coverage
        run: mvn jacoco:report

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 30

      - name: Upload Test Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

      - name: Display Coverage Summary
        run: |
          echo "Coverage Summary:"
          for service in api-gateway currency-service user-service analytics-service; do
            if [ -f "$service/target/site/jacoco/index.html" ]; then
              echo "$service:"
              grep -A 3 "Total" "$service/target/site/jacoco/index.html" | head -4
            fi
          done
