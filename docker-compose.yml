version: '3.8'

services:
  postgres-currency:
    image: postgres:15-alpine
    container_name: postgres-currency
    environment:
      POSTGRES_DB: ${POSTGRES_CURRENCY_DB:-currency_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - postgres_currency_data:/var/lib/postgresql/data
      - ./init-scripts/currency-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d currency_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cerps-network
    restart: unless-stopped

  currency-service:
    build:
      context: .
      dockerfile: currency-service/Dockerfile
    container_name: currency-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-currency:5432/${POSTGRES_CURRENCY_DB:-currency_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      FIXER_API_KEY: ${FIXER_API_KEY:-test-key}
      EXCHANGERATES_API_KEY: ${EXCHANGERATES_API_KEY:-test-key}
      CURRENCYAPI_KEY: ${CURRENCYAPI_KEY:-test-key}
    depends_on:
      postgres-currency:
        condition: service_healthy
    networks:
      - cerps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    container_name: analytics-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-currency:5432/${POSTGRES_CURRENCY_DB:-currency_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_ANALYTICS_USER:-analytics_readonly}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_ANALYTICS_PASSWORD:-analytics_readonly_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    depends_on:
      postgres-currency:
        condition: service_healthy
    networks:
      - cerps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_currency_data:

networks:
  cerps-network:
