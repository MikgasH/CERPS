spring:
  application:
    name: Analytics-Service-Test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  liquibase:
    enabled: false

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never

server:
  port: 0

user-service:
  url: http://localhost:8083

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tdGVzdGluZy1wdXJwb3Nlcy1vbmx5LTEyMzQ1Njc4OTA=

logging:
  level:
    org.example.analyticsservice: DEBUG
