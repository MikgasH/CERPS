server:
  port: 8082

spring:
  application:
    name: analytics-service

currency-service:
  url: ${CURRENCY_SERVICE_URL:http://localhost:8080}

admin:
  api-key: ${ADMIN_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    enable:
      jvm: false
      process: false
      system: false
      tomcat: false
      logback: false
      executor: false
      spring.security: false
      disk: false
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.example.analyticsservice: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

resilience4j:
  retry:
    instances:
      currencyService:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.example.cerps.common.exception.ExternalServiceException
          - org.springframework.web.client.RestClientException

cache:
  trends:
    ttl: 28800
    short-ttl: 300
