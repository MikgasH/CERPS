# Railway.app deployment profile — extreme memory savings
server:
  port: ${PORT:8082}
  tomcat:
    max-threads: 10
    min-spare-threads: 2
    max-connections: 50
    accept-count: 10
    connection-timeout: 5000

spring:
  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL}}
    username: ${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:analytics_readonly}}
    password: ${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:analytics_readonly_pass}}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 120000
      max-lifetime: 300000
      connection-timeout: 10000
      leak-detection-threshold: 30000

  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 10
        query:
          plan_cache_max_size: 64
          plan_parameter_metadata_max_size: 16

# Disable Swagger UI in production to save RAM (~15-20MB)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Slim down actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: false
  prometheus:
    metrics:
      export:
        enabled: false

# Reduce logging overhead
logging:
  level:
    root: WARN
    org.example.analyticsservice: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
